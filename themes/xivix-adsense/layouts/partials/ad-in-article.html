<!-- AdSense In-Article Ad Unit -->
{{ if .Site.Params.adsensePublisher }}
{{ with .Site.Params.adsenseInArticleSlot }}
<div class="adsense-container my-6 text-center" aria-label="Advertisement" style="min-height:0;">
  <ins class="adsbygoogle"
       style="display:block; text-align:center; min-height:0;"
       data-ad-layout="in-article"
       data-ad-format="fluid"
       data-ad-client="{{ $.Site.Params.adsensePublisher }}"
       data-ad-slot="{{ . }}"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
{{ end }}
